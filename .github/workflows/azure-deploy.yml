# Workflow de despliegue intencionalmente deshabilitado.
#
# Antes de habilitar CI/CD se debe decidir y documentar:
# - imagen base y Dockerfile del monolito Bancos;
# - registro de contenedores y credenciales de publicación;
# - plataforma de ejecución y configuración de secretos;
# - tarea de autenticación y seguridad requerida antes de publicar en Azure.
#
# No se construyen imágenes, no se publican artefactos y no se despliega ninguna
# revisión mientras esas decisiones no estén aprobadas.
