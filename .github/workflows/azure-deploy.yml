name: Deploy to Azure Container Apps

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - '.github/workflows/**'
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub

env:
  AZURE_SUBSCRIPTION_ID: 39ca217e-c631-48db-b8be-b2a520a23cd6
  ACR_NAME: acrclickeat
  IMAGE_NAME: marketing1on1
  RESOURCE_GROUP: rg-clickeat
  CONTAINER_APP_NAME: clickeat-marketing1on1
  AZURE_REGION: eastus2

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🔐 Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: ✅ Validate Azure deployment resources
      run: |
        set -euo pipefail

        echo "Validating Azure subscription and production resources..."
        az account set --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}"

        ACTIVE_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
        if [ "$ACTIVE_SUBSCRIPTION_ID" != "${{ env.AZURE_SUBSCRIPTION_ID }}" ]; then
          echo "::error::Azure login is using subscription '$ACTIVE_SUBSCRIPTION_ID', expected '${{ env.AZURE_SUBSCRIPTION_ID }}'."
          exit 1
        fi

        if ! az group show --name "${{ env.RESOURCE_GROUP }}" --query id -o tsv >/dev/null; then
          echo "::error::Resource group '${{ env.RESOURCE_GROUP }}' was not found in subscription '${{ env.AZURE_SUBSCRIPTION_ID }}'."
          exit 1
        fi

        ACR_LOGIN_SERVER=$(az acr show \
          --name "${{ env.ACR_NAME }}" \
          --resource-group "${{ env.RESOURCE_GROUP }}" \
          --query loginServer \
          -o tsv)

        if [ "$ACR_LOGIN_SERVER" != "${{ env.ACR_NAME }}.azurecr.io" ]; then
          echo "::error::ACR '${{ env.ACR_NAME }}' resolved to '$ACR_LOGIN_SERVER'. Expected '${{ env.ACR_NAME }}.azurecr.io'."
          exit 1
        fi

        APP_FQDN=$(az containerapp show \
          --name "${{ env.CONTAINER_APP_NAME }}" \
          --resource-group "${{ env.RESOURCE_GROUP }}" \
          --query "properties.configuration.ingress.fqdn" \
          -o tsv)

        if [ -z "$APP_FQDN" ]; then
          echo "::error::Container App '${{ env.CONTAINER_APP_NAME }}' was not found or has no ingress FQDN."
          exit 1
        fi

        echo "Azure resources OK: $ACR_LOGIN_SERVER -> https://$APP_FQDN"

    - name: 🐳 Login to Azure Container Registry
      run: |
        set -euo pipefail

        az account set --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}"
        ACR_TOKEN=$(az acr login --name "${{ env.ACR_NAME }}" --expose-token --output tsv --query accessToken)

        if [ -z "$ACR_TOKEN" ]; then
          echo "::error::Could not get an ACR access token for '${{ env.ACR_NAME }}'. Check AZURE_CREDENTIALS RBAC on '${{ env.RESOURCE_GROUP }}' and the ACR."
          exit 1
        fi

        printf '%s' "$ACR_TOKEN" | docker login "${{ env.ACR_NAME }}.azurecr.io" --username 00000000-0000-0000-0000-000000000000 --password-stdin

    - name: 🏗️ Build Docker image
      run: |
        set -euo pipefail

        docker build \
          --no-cache \
          --platform linux/amd64 \
          --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
          --build-arg VCS_REF=${{ github.sha }} \
          -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
          .

    - name: 📤 Push to ACR
      run: |
        set -euo pipefail

        docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

        az account set --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}"
        PUSHED_TAG=$(az acr repository show-tags \
          --name "${{ env.ACR_NAME }}" \
          --repository "${{ env.IMAGE_NAME }}" \
          --query "[?@=='${{ github.sha }}'] | [0]" \
          -o tsv)

        if [ "$PUSHED_TAG" != "${{ github.sha }}" ]; then
          echo "::error::Image tag '${{ github.sha }}' was pushed by Docker but was not found in ACR '${{ env.ACR_NAME }}'."
          exit 1
        fi

    - name: 🚀 Deploy to Azure Container App
      uses: azure/CLI@v1
      with:
        inlineScript: |
          set -euo pipefail

          az account set --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}"
          REVISION_NAME="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          FULL_IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"

          echo "🚀 Desplegando nueva revisión: $REVISION_NAME"
          echo "📦 Imagen: $FULL_IMAGE"

          # Listar revisiones activas antes del deployment
          echo "📋 Revisiones activas antes del deployment:"
          az containerapp revision list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "[?properties.active==\`true\`].{Name:name, Traffic:properties.trafficWeight}" \
            -o table

          # Crear nueva revisión con la imagen actualizada
          # En single revision mode, Azure automáticamente:
          # - Desactiva revisiones antiguas
          # - Asigna 100% del tráfico a la nueva revisión
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image $FULL_IMAGE \
            --revision-suffix $REVISION_NAME \
            --set-env-vars \
              "ConnectionStrings__DefaultConnection=${{ secrets.SQL_CONNECTION_STRING }}" \
              "Jwt__SecretKey=${{ secrets.JWT_SECRET_KEY }}" \
              "Session__SecretKey=${{ secrets.SESSION_SECRET_KEY }}" \
              "AzureAiFoundry__Endpoint=${{ secrets.AZURE_AI_FOUNDRY_ENDPOINT }}" \
              "AzureAiFoundry__ApiKey=${{ secrets.AZURE_AI_FOUNDRY_API_KEY }}" \
              "AzureAiFoundry__ImageModel=gpt-image-2" \
              "ASPNETCORE_ENVIRONMENT=Production" \
              "HANGFIRE_DASHBOARD_OPEN_ACCESS=true"

          echo ""
          echo "⏳ Esperando 20 segundos para que la nueva revisión esté lista..."
          sleep 20

          # Obtener URL de la aplicación
          APP_URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            -o tsv)

          echo ""
          echo "✅ Deployed successfully!"
          echo "🌐 Application URL: https://$APP_URL"
          echo "🔧 Hangfire Dashboard: https://$APP_URL/hangfire"
          echo "📦 Image: $FULL_IMAGE"
          echo "📝 Revision: $REVISION_NAME"
          echo ""

    - name: 📊 Check deployment health
      uses: azure/CLI@v1
      with:
        inlineScript: |
          set -euo pipefail

          az account set --subscription "${{ env.AZURE_SUBSCRIPTION_ID }}"
          echo "Waiting for revision to be healthy..."
          sleep 10

          az containerapp revision list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "[?properties.active==\`true\`].{Name:name, Health:properties.healthState, Traffic:properties.trafficWeight}" \
            -o table

    - name: 💬 Deployment summary
      run: |
        echo "## 🎉 Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Image**: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Container App**: ${{ env.CONTAINER_APP_NAME }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Resource Group**: ${{ env.RESOURCE_GROUP }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
